<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Safety Panel</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #f3f4f6;
  color: #111;
  display: flex;
}

/* MENU GAUCHE */
.sidebar {
  width: 240px;
  background: #111827;
  color: white;
  height: 100vh;
  padding: 20px;
  position: fixed;
}

.sidebar h2 {
  font-size: 16px;
  margin-bottom: 15px;
  color: #facc15;
}

.nav {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.nav button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #1f2937;
  color: white;
  text-align: left;
}

.nav button:hover {
  background: #374151;
}

/* CONTENU */
.content {
  margin-left: 260px;
  padding: 30px;
  max-width: 900px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 14px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h1 {
  margin-top: 0;
}

.block {
  margin-top: 15px;
  padding: 15px;
  background: #f9fafb;
  border-radius: 10px;
  border-left: 5px solid #3b82f6;
}

.footer {
  margin-top: 40px;
  padding: 20px;
  background: #fff;
  border-radius: 12px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button.check {
  margin-top: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: #111827;
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<!-- MENU -->
<div class="sidebar">
  <h2>🛡️ Sécurité</h2>

  <div class="nav">
    <button onclick="show('roblox')">Roblox</button>
    <button onclick="show('youtube')">YouTube</button>
    <button onclick="show('tiktok')">TikTok</button>
    <button onclick="show('fortnite')">Fortnite</button>
    <button onclick="show('cod')">Call of Duty</button>
    <button onclick="show('check')">Vérifier URL</button>
  </div>
</div>

<!-- CONTENU -->
<div class="content">

<div class="card" id="page">

<h1>Bienvenue sur le panneau de sécurité</h1>

<p>
Choisis une plateforme à gauche pour voir comment éviter les arnaques et protéger ton compte.
</p>

</div>

</div>

<script>

function show(page) {
  const p = document.getElementById("page");

  if (page === "roblox") {
    p.innerHTML = `
    <h1>Roblox 🔴</h1>
    <div class="block">
    ⚠️ Ne donne jamais ton mot de passe Roblox.<br>
    ⚠️ Méfie-toi des “free robux” et générateurs.<br>
    ⚠️ Roblox ne demande jamais ton mot de passe en dehors du site officiel.
    </div>
    <p>
    🔗 Site officiel : https://www.roblox.com
    </p>`;
  }

  if (page === "youtube") {
    p.innerHTML = `
    <h1>YouTube ▶️</h1>
    <div class="block">
    ⚠️ Ne clique pas sur des liens “cadeaux” dans les commentaires.<br>
    ⚠️ Les faux giveaways sont très fréquents.<br>
    ⚠️ Google / YouTube ne demandent jamais ton mot de passe par message.
    </div>
    <p>
    🔗 Site officiel : https://www.youtube.com
    </p>`;
  }

  if (page === "tiktok") {
    p.innerHTML = `
    <h1>TikTok 🎵</h1>
    <div class="block">
    ⚠️ Attention aux liens en bio ou messages privés.<br>
    ⚠️ Faux comptes créateurs très fréquents.<br>
    ⚠️ Ne jamais se connecter via un lien externe.
    </div>
    <p>
    🔗 Site officiel : https://www.tiktok.com
    </p>`;
  }

  if (page === "fortnite") {
    p.innerHTML = `
    <h1>Fortnite 🎮</h1>
    <div class="block">
    ⚠️ Epic Games ne donne jamais de V-Bucks gratuits.<br>
    ⚠️ Attention aux sites “skins gratuits”.<br>
    ⚠️ Toujours passer par Epic Games officiel.
    </div>
    <p>
    🔗 Site officiel : https://www.fortnite.com
    </p>`;
  }

  if (page === "cod") {
    p.innerHTML = `
    <h1>Call of Duty 🎯</h1>
    <div class="block">
    ⚠️ Aucun site externe ne donne de CP gratuits.<br>
    ⚠️ Méfie-toi des liens de “boost XP”.<br>
    ⚠️ Ne partage jamais ton compte Activision.
    </div>
    <p>
    🔗 Site officiel : https://www.callofduty.com
    </p>`;
  }

  if (page === "check") {
    p.innerHTML = `
    <h1>🔎 Vérifier une URL</h1>

    <p>Colle un lien pour vérifier s’il semble dangereux :</p>

    <input id="url" placeholder="https://example.com">
    <button class="check" onclick="check()">Analyser</button>

    <p id="result"></p>
    `;
  }
}

function check() {
  let url = document.getElementById("url").value.toLowerCase();
  let r = document.getElementById("result");

  let trusted = ["youtube.com","roblox.com","tiktok.com","epicgames.com","callofduty.com"];

  if (trusted.some(t => url.includes(t))) {
    r.innerHTML = "✅ Site fiable connu";
    r.style.color = "green";
  }
  else if (url.includes("free") || url.includes("hack") || url.includes("robux")) {
    r.innerHTML = "🚨 Très suspect";
    r.style.color = "red";
  }
  else {
    r.innerHTML = "⚠️ Inconnu, évite si tu n'es pas sûr";
    r.style.color = "orange";
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Security Panel</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #f5f5f4;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  height: 100vh;
  background: #111827;
  color: white;
  padding: 20px;
  position: fixed;
}

.sidebar h2 {
  color: #facc15;
}

.menu button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #1f2937;
  color: white;
  cursor: pointer;
  text-align: left;
  transition: 0.2s;
}

.menu button:hover {
  background: #374151;
}

/* CONTENT */
.content {
  margin-left: 270px;
  padding: 30px;
  width: 100%;
  max-width: 900px;
}

/* CARD + ANIMATION */
.card {
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);

  opacity: 1;
  transform: translateY(0);
  transition: all 0.35s ease;
}

/* animation sortie */
.card.hide {
  opacity: 0;
  transform: translateY(20px);
}

/* animation entrée */
.card.show {
  opacity: 1;
  transform: translateY(0);
}

h1 {
  margin-top: 0;
}

.block {
  background: #f9fafb;
  padding: 15px;
  border-radius: 12px;
  margin-top: 15px;
  border-left: 5px solid #3b82f6;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button.check {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #111827;
  color: white;
  cursor: pointer;
}

small {
  color: #6b7280;
}
</style>

</head>

<body>

<!-- MENU -->
<div class="sidebar">
  <h2>🛡️ Security Panel</h2>

  <div class="menu">
    <button onclick="load('home')">Accueil</button>
    <button onclick="load('roblox')">Roblox</button>
    <button onclick="load('youtube')">YouTube</button>
    <button onclick="load('tiktok')">TikTok</button>
    <button onclick="load('fortnite')">Fortnite</button>
    <button onclick="load('cod')">Call of Duty</button>
    <button onclick="load('check')">Vérifier URL</button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="card" id="page">
    <h1>Bienvenue 👋</h1>
    <p>Choisis une plateforme à gauche.</p>
  </div>
</div>

<script>

function animateChange(html) {
  let page = document.getElementById("page");

  // fade out
  page.classList.add("hide");

  setTimeout(() => {
    page.innerHTML = html;

    // reset + fade in
    page.classList.remove("hide");
    page.classList.add("show");

    setTimeout(() => {
      page.classList.remove("show");
    }, 350);

  }, 250);
}

function load(p) {

  if (p === "home") {
    animateChange(`
      <h1>🛡️ Security Panel</h1>
      <p>Ce site aide à éviter les arnaques et liens dangereux.</p>
    `);
  }

  if (p === "roblox") {
    animateChange(`
      <h1>Roblox</h1>
      <div class="block">
      ❗ Ne donne jamais ton mot de passe<br>
      ❗ Attention aux “free Robux”<br>
      ❗ Toujours utiliser roblox.com
      </div>
      <small>https://www.roblox.com</small>
    `);
  }

  if (p === "youtube") {
    animateChange(`
      <h1>YouTube</h1>
      <div class="block">
      ❗ Faux giveaways dans commentaires<br>
      ❗ Liens suspects dans descriptions<br>
      ❗ Google ne demande jamais ton mot de passe
      </div>
      <small>https://www.youtube.com</small>
    `);
  }

  if (p === "tiktok") {
    animateChange(`
      <h1>TikTok</h1>
      <div class="block">
      ❗ Liens en bio dangereux<br>
      ❗ Faux comptes créateurs<br>
      ❗ Ne pas se connecter via liens externes
      </div>
      <small>https://www.tiktok.com</small>
    `);
  }

  if (p === "fortnite") {
    animateChange(`
      <h1>Fortnite</h1>
      <div class="block">
      ❗ Aucun V-Bucks gratuits<br>
      ❗ Sites skins = arnaques<br>
      ❗ Utiliser Epic Games officiel
      </div>
      <small>https://www.fortnite.com</small>
    `);
  }

  if (p === "cod") {
    animateChange(`
      <h1>Call of Duty</h1>
      <div class="block">
      ❗ Aucun CP gratuit<br>
      ❗ Attention hacks/boosts<br>
      ❗ Ne partage jamais ton compte
      </div>
      <small>https://www.callofduty.com</small>
    `);
  }

  if (p === "check") {
    animateChange(`
      <h1>🔎 Vérifier une URL</h1>
      <input id="url" placeholder="https://exemple.com">
      <button class="check" onclick="check()">Analyser</button>
      <p id="result"></p>
    `);
  }
}

function check() {
  let url = document.getElementById("url").value.toLowerCase();
  let r = document.getElementById("result");

  let safe = ["youtube.com","roblox.com","tiktok.com","epicgames.com","callofduty.com"];

  if (safe.some(d => url.includes(d))) {
    r.innerHTML = "✅ Site fiable";
    r.style.color = "green";
  }
  else if (url.includes("free") || url.includes("hack") || url.includes("robux")) {
    r.innerHTML = "🚨 Suspect";
    r.style.color = "red";
  }
  else {
    r.innerHTML = "⚠️ Inconnu";
    r.style.color = "orange";
  }
}

</script>

</body>
</html>

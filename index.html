<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Security Panel</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #f5f5f4;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  height: 100vh;
  background: #111827;
  color: white;
  padding: 20px;
  position: fixed;
}

.sidebar h2 {
  color: #facc15;
  font-size: 16px;
}

.menu button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #1f2937;
  color: white;
  cursor: pointer;
  text-align: left;
}

.menu button:hover {
  background: #374151;
}

/* CONTENT */
.content {
  margin-left: 270px;
  padding: 30px;
  width: 100%;
  max-width: 900px;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h1 {
  margin-top: 0;
  font-size: 28px;
}

.block {
  background: #f9fafb;
  padding: 15px;
  border-radius: 12px;
  margin-top: 15px;
  border-left: 5px solid #3b82f6;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button.check {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #111827;
  color: white;
  cursor: pointer;
}

small {
  color: #6b7280;
}
</style>

</head>

<body>

<!-- MENU -->
<div class="sidebar">
  <h2>🛡️ Security Panel</h2>

  <div class="menu">
    <button onclick="load('home')">Accueil</button>
    <button onclick="load('roblox')">Roblox</button>
    <button onclick="load('youtube')">YouTube</button>
    <button onclick="load('tiktok')">TikTok</button>
    <button onclick="load('fortnite')">Fortnite</button>
    <button onclick="load('cod')">Call of Duty</button>
    <button onclick="load('check')">Vérifier URL</button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

<div class="card" id="page">
  <h1>Bienvenue 👋</h1>
  <p>Choisis une plateforme pour voir comment éviter les arnaques.</p>
</div>

</div>

<script>

function load(page) {
  let p = document.getElementById("page");

  if (page === "home") {
    p.innerHTML = `
    <h1>🛡️ Security Panel</h1>
    <p>Ce site t’aide à éviter les arnaques et liens dangereux sur Internet.</p>
    `;
  }

  if (page === "roblox") {
    p.innerHTML = `
    <h1>Roblox</h1>
    <div class="block">
    ❗ Ne jamais donner ton mot de passe.<br>
    ❗ Attention aux “free Robux”.<br>
    ❗ Roblox ne demande jamais tes identifiants ailleurs que sur roblox.com
    </div>
    <small>Site officiel : https://www.roblox.com</small>
    `;
  }

  if (page === "youtube") {
    p.innerHTML = `
    <h1>YouTube</h1>
    <div class="block">
    ❗ Attention aux faux giveaways.<br>
    ❗ Ne clique pas sur des liens dans les commentaires.<br>
    ❗ Google ne demande jamais ton mot de passe.
    </div>
    <small>Site officiel : https://www.youtube.com</small>
    `;
  }

  if (page === "tiktok") {
    p.innerHTML = `
    <h1>TikTok</h1>
    <div class="block">
    ❗ Attention aux liens en bio.<br>
    ❗ Faux comptes créateurs fréquents.<br>
    ❗ Ne jamais se connecter via un lien externe.
    </div>
    <small>Site officiel : https://www.tiktok.com</small>
    `;
  }

  if (page === "fortnite") {
    p.innerHTML = `
    <h1>Fortnite</h1>
    <div class="block">
    ❗ Aucun V-Bucks gratuits.<br>
    ❗ Attention aux sites de skins gratuits.<br>
    ❗ Toujours utiliser Epic Games officiel.
    </div>
    <small>Site officiel : https://www.fortnite.com</small>
    `;
  }

  if (page === "cod") {
    p.innerHTML = `
    <h1>Call of Duty</h1>
    <div class="block">
    ❗ Aucun CP gratuit.<br>
    ❗ Attention aux hacks et boosts.<br>
    ❗ Ne partage jamais ton compte Activision.
    </div>
    <small>Site officiel : https://www.callofduty.com</small>
    `;
  }

  if (page === "check") {
    p.innerHTML = `
    <h1>🔎 Vérifier une URL</h1>

    <input id="url" placeholder="Colle ton lien ici">
    <button class="check" onclick="check()">Analyser</button>

    <p id="result"></p>
    `;
  }
}

function check() {
  let url = document.getElementById("url").value.toLowerCase();
  let r = document.getElementById("result");

  let safe = ["youtube.com","roblox.com","tiktok.com","epicgames.com","callofduty.com"];

  if (safe.some(d => url.includes(d))) {
    r.innerHTML = "✅ Site fiable connu";
    r.style.color = "green";
  }
  else if (url.includes("free") || url.includes("hack") || url.includes("robux")) {
    r.innerHTML = "🚨 Lien suspect";
    r.style.color = "red";
  }
  else {
    r.innerHTML = "⚠️ Inconnu, fais attention";
    r.style.color = "orange";
  }
}

</script>

</body>
</html>
